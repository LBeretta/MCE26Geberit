<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geberit - Turni Fiera MCE 2026</title>
  <meta name="description" content="Turni consulenti Geberit per Fiera MCE 2026" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="logo-geberit(1).jpg" alt="Geberit" class="brand-logo" />
        <div>
          <p class="eyebrow">Consulenti stand</p>
          <h1>Turni Fiera MCE 2026</h1>
        </div>
      </div>
      <p class="subtitle">Trova rapidamente la tua postazione e la tua pausa pranzo.</p>
    </header>

    <main class="layout">
      <section class="search-panel card">
        <label for="consultantSearch" class="label">Cerca consulente</label>
        <div class="search-wrap">
          <input id="consultantSearch" type="search" placeholder="Scrivi nome o sigla, es. CAPDA3" autocomplete="off" />
          <button id="clearSearch" class="ghost-btn" type="button" aria-label="Pulisci">✕</button>
        </div>
        <div id="quickStatus" class="quick-status hidden"></div>
        <div class="list-header">
          <span>Elenco consulenti</span>
          <span id="countBadge" class="count-badge"></span>
          <button id="toggleList" class="toggle-list-btn" type="button" aria-label="Mostra/nascondi elenco">
            <span id="toggleIcon" class="toggle-icon">▲</span>
          </button>
        </div>
        <div id="consultantList" class="consultant-list"></div>
      </section>

      <section class="details-panel">
        <div id="emptyState" class="card empty-state">
          <div class="empty-emoji">📍</div>
          <h2>Seleziona un consulente</h2>
          <p>Vedrai qui i turni per ogni giorno e, se presente, la pausa pranzo.</p>
        </div>

        <div id="consultantView" class="hidden">
          <section class="card hero-card">
            <div>
              <p class="eyebrow">Consulente</p>
              <h2 id="consultantName">-</h2>
            </div>
            <div class="hero-stats">
              <div class="stat">
                <span class="stat-label">Turni</span>
                <strong id="totalTurns">0</strong>
              </div>
              <div class="stat">
                <span class="stat-label">Pausa pranzo</span>
                <strong id="lunchCount">0</strong>
              </div>
            </div>
          </section>

          <section id="nowCard" class="card now-card hidden"></section>
          <section id="lunchCard" class="card lunch-card hidden"></section>
          <section id="daysContainer" class="days-container"></section>
        </div>
      </section>
    </main>
  </div>

  <script src="schedule-data(1).js"></script>
  <script src="script(1).js"></script>
</body>
</html>
